<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 350px; padding: 15px; font-family: Arial; }
    button { width: 100%; padding: 10px; background: #1890ff; color: white; border: none; cursor: pointer; margin-bottom: 10px; }
    button:hover { background: #40a9ff; }
    #result { max-height: 400px; overflow-y: auto; }
    .item { padding: 5px; border-bottom: 1px solid #eee; font-size: 12px; word-break: break-all; }
    .count { font-weight: bold; color: #1890ff; margin-bottom: 10px; }
    .status { color: #666; font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <button id="crawl">爬取所有标题</button>
  <div id="status" class="status"></div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
